name: Feature request
description: Suggest a new AdLint capability, workflow, or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or review gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should AdLint do?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and privacy notes
      description: Does this involve raw submissions, customer data, external APIs, or model calls?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
