policies:
  - id: tiktok_weight_management_claim
    severity: high
    category: platform_policy
    description: TikTok ads can restrict weight-management and body-image claims.
    source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-misleading-and-false-content?lang=en
    source_note: TikTok misleading, false-content, and before-after policy guidance
    modules: [platform]
    platforms: [tiktok]
    industries: [health, wellness]
    signals:
      - lose * pounds
      - weight loss
      - skinny
      - melts fat
      - belly fat
      - body transformation
    recommended_action: Avoid body-image pressure and absolute weight-management language.
    rewrite_strategy: wellness_support

  - id: tiktok_misleading_content
    severity: high
    category: platform_policy
    description: Misleading efficacy, urgency, or testimonial framing can trigger review.
    source_url: https://ads.tiktok.com/help/article/tiktok-ads-policy-misleading-and-false-content?lang=en
    source_note: TikTok misleading and false-content policy guidance
    modules: [platform]
    platforms: [tiktok]
    signals:
      - guaranteed
      - secret
      - instant
      - miracle
      - everyone is switching
    recommended_action: Use specific, substantiated, and qualified claims.
    rewrite_strategy: soften_absolute

  - id: tiktok_disclosure_risk
    severity: medium
    category: platform_policy
    description: Sponsored, affiliate, or creator claims may need prominent disclosures.
    source_url: https://www.tiktok.com/legal/page/global/bc-policy/en
    source_note: TikTok branded-content disclosure policy guidance
    modules: [platform]
    platforms: [tiktok]
    industries: [creator, wellness, health]
    signals:
      - sponsored
      - affiliate
      - brand-tagged
      - partner
      - paid partnership
      - promo code
    recommended_action: Confirm creator, sponsorship, and affiliate disclosures are prominent.
    rewrite_strategy: add_disclosure
