# Initial Meta Ads heuristic coverage for local preflight review.
# Source notes: see docs/meta_ads_scope.md for official Meta references, reviewed scope,
# and explicit non-goals. These rules are decision support, not Meta approval guarantees.

policies:
  - id: meta_personal_attributes_health
    severity: high
    category: platform_policy
    description: Meta ads should not imply knowledge of a viewer's health, body, or medical condition.
    modules: [platform]
    platforms: [meta]
    industries: [health, wellness]
    signals:
      - are you overweight
      - do you have diabetes
      - diagnosed with
      - struggling with anxiety
      - your chronic pain
      - tired of your symptoms
    recommended_action: Reframe the ad around the product or service benefit without implying personal health attributes.
    rewrite_strategy: neutral_targeting

  - id: meta_personal_attributes_finance
    severity: high
    category: platform_policy
    description: Meta ads should not imply knowledge of a viewer's financial hardship or credit status.
    modules: [platform]
    platforms: [meta]
    industries: [finance]
    signals:
      - struggling with debt
      - bad credit
      - behind on bills
      - are you broke
      - can't pay rent
      - your credit problems
    recommended_action: Remove direct references to the viewer's financial status and describe the offer neutrally.
    rewrite_strategy: neutral_targeting

  - id: meta_health_appearance_results
    severity: high
    category: platform_policy
    description: Meta health and appearance ads can be rejected for unrealistic results or negative self-perception framing.
    modules: [platform]
    platforms: [meta]
    industries: [health, wellness]
    signals:
      - before and after
      - transformation photo
      - lose * pounds
      - melts fat
      - belly fat
      - dramatic results
      - body-shaming
      - perfect body
      - hate your body
    recommended_action: Avoid transformation framing and use qualified wellness-support language.
    rewrite_strategy: wellness_support

  - id: meta_health_wellness_age_targeting_review
    severity: medium
    category: platform_policy
    description: Meta health, weight-loss, cosmetic, sexual-health, and reproductive-health ads can require 18+ targeting review.
    modules: [platform]
    platforms: [meta]
    industries: [health, wellness]
    requires_review: true
    signals:
      - weight loss pills
      - weight loss supplement
      - cosmetic procedure
      - botox
      - reproductive health
      - contraception
      - family planning
      - sexual health
    recommended_action: Confirm age targeting and health/wellness policy eligibility before launch.
    rewrite_strategy: add_review_reminder

  - id: meta_financial_services_authorization_review
    severity: medium
    category: platform_policy
    description: Meta financial product ads can require authorization, licensing, disclosures, and 18+ targeting review.
    modules: [platform]
    platforms: [meta]
    industries: [finance]
    requires_review: true
    signals:
      - credit card application
      - apply for credit
      - apply for a loan
      - get a loan
      - loan approval
      - insurance quote
      - investment opportunity
      - mortgage application
      - refinance today
      - cash advance
    recommended_action: Confirm financial-services authorization, required disclosures, and 18+ targeting before launch.
    rewrite_strategy: add_review_reminder

  - id: meta_special_ad_category_review
    severity: medium
    category: platform_policy
    description: Meta campaigns for housing, employment, or financial products/services may require Special Ad Category configuration and targeting limits.
    modules: [platform]
    platforms: [meta]
    requires_review: true
    signals:
      - housing opportunity
      - apartment rental
      - mortgage application
      - job opening
      - hiring now
      - apply for this role
      - employment opportunity
      - financial products and services
      - credit offer
    recommended_action: Confirm Special Ad Category selection, country settings, and audience restrictions before launch.
    rewrite_strategy: add_review_reminder

  - id: meta_private_information_request
    severity: high
    category: platform_policy
    description: Meta ads should not request financial, health, or other private information without appropriate permission and review.
    modules: [platform]
    platforms: [meta]
    requires_review: true
    signals:
      - enter your credit score
      - share your bank account
      - provide your income
      - submit your medical history
      - upload your diagnosis
      - tell us your symptoms
      - provide your health information
    recommended_action: Remove private-information requests from ad creative and review the landing-page intake flow.
    rewrite_strategy: add_review_reminder

  - id: meta_branded_content_disclosure
    severity: medium
    category: platform_policy
    description: Meta branded-content and creator integrations may need clear sponsorship tagging and disclosures.
    modules: [platform]
    platforms: [meta]
    industries: [creator, wellness, health, finance]
    signals:
      - paid partnership
      - affiliate
      - sponsored
      - promo code
      - partner product
    recommended_action: Confirm branded-content tagging and sponsorship or affiliate disclosures before launch.
    rewrite_strategy: add_disclosure
