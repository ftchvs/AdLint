policies:
  - id: missing_affiliate_or_sponsor_disclosure
    severity: medium
    category: disclosure
    description: Affiliate, creator, or sponsorship language may require clear disclosure.
    source_url: https://www.ftc.gov/business-guidance/resources/ftcs-endorsement-guides
    source_note: FTC Endorsement Guides disclosure guidance
    modules: [disclosure, platform]
    industries: [creator, wellness, health, finance]
    requires_review: true
    signals:
      - affiliate
      - sponsored
      - paid partnership
      - commission
      - promo code
    recommended_action: Add or verify clear sponsored, affiliate, or material-connection disclosure.
    rewrite_strategy: add_disclosure

  - id: landing_page_offer_mismatch
    severity: medium
    category: landing_page
    description: Landing page content may not match the ad's offer or claim framing.
    source_url: https://support.google.com/adspolicy/answer/6008942?hl=en
    source_note: Google Ads destination and editorial policy guidance
    modules: [landing_page]
    signals:
      - mismatch_detected
    recommended_action: Align the landing page headline, offer terms, and disclosures with the ad.
    rewrite_strategy: clarify_terms
